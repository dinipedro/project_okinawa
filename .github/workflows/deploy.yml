# ===========================================
# Project Okinawa — Continuous Deployment
# Build, push to GHCR, deploy to staging & production
# ===========================================

name: Deploy Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'platform/backend/**'
      - 'docker-compose.yml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      skip_staging:
        description: 'Skip staging (production hotfix)'
        required: false
        default: false
        type: boolean

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/backend
  NODE_VERSION: '20'

permissions:
  contents: read
  packages: write

jobs:
  # =============================================
  # Job 1: Build & Push Docker Image to GHCR
  # =============================================
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # On push: always run. On dispatch: always run.
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch'

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build-push.outputs.digest }}
      short_sha: ${{ steps.vars.outputs.short_sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set build variables
        id: vars
        run: |
          echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=long
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{date 'YYYYMMDD-HHmmss'}}

      - name: Build and push Docker image
        id: build-push
        uses: docker/build-push-action@v7
        with:
          context: ./platform/backend
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ steps.vars.outputs.build_date }}
            BUILD_SHA=${{ github.sha }}

      - name: Verify image was pushed
        run: |
          echo "Image digest: ${{ steps.build-push.outputs.digest }}"
          echo "Image tags:"
          echo "${{ steps.meta.outputs.tags }}"
          echo ""
          echo "Build completed successfully."

  # =============================================
  # Job 2: Deploy to Staging
  # =============================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build-and-push]

    # Skip staging only on manual dispatch with skip_staging or production-only
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.skip_staging != true)

    environment:
      name: staging
      url: https://staging.noowe.com

    outputs:
      deploy_status: ${{ steps.verify.outputs.status }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add staging host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.STAGING_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to staging server
        id: deploy
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_USER: ${{ secrets.STAGING_USER }}
          IMAGE_TAG: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          DEPLOY_DIR: ${{ secrets.STAGING_DEPLOY_DIR }}
        run: |
          echo "Deploying image: ${IMAGE_TAG}"

          ssh ${STAGING_USER}@${STAGING_HOST} << 'DEPLOY_SCRIPT'
            set -euo pipefail

            cd ${DEPLOY_DIR:-/opt/noowe}

            # Save current image tag for rollback
            if docker compose ps backend --format '{{.Image}}' 2>/dev/null; then
              docker compose ps backend --format '{{.Image}}' > .rollback-image-tag
            fi

            # Pull the new image
            echo "Pulling new image..."
            docker pull ${IMAGE_TAG}

            # Update the image tag in the environment
            sed -i "s|^BACKEND_IMAGE=.*|BACKEND_IMAGE=${IMAGE_TAG}|" .env

            # Deploy with zero-downtime: start new, health check, stop old
            echo "Starting deployment..."
            docker compose --profile prod up -d --no-deps backend

            # Wait for container to be healthy
            echo "Waiting for health check..."
            RETRIES=30
            until docker compose ps backend --format '{{.Health}}' | grep -q "healthy"; do
              RETRIES=$((RETRIES - 1))
              if [ $RETRIES -le 0 ]; then
                echo "ERROR: Container failed health check"
                exit 1
              fi
              sleep 2
            done

            echo "Staging deployment completed successfully."
          DEPLOY_SCRIPT

      - name: Run smoke tests
        id: smoke
        env:
          STAGING_URL: https://staging-api.noowe.com
        run: |
          echo "Running smoke tests against staging..."

          # Health endpoint
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 10 --retry 3 --retry-delay 5 \
            "${STAGING_URL}/api/v1/health")

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "ERROR: Health check returned HTTP ${HTTP_STATUS}"
            exit 1
          fi
          echo "Health check passed (HTTP ${HTTP_STATUS})."

          # Verify version/commit SHA in response
          HEALTH_BODY=$(curl -s --max-time 10 "${STAGING_URL}/api/v1/health")
          echo "Health response: ${HEALTH_BODY}"

          # API docs endpoint
          DOCS_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 10 \
            "${STAGING_URL}/api/docs")
          echo "API docs status: HTTP ${DOCS_STATUS}"

          echo "All smoke tests passed."

      - name: Verify deployment
        id: verify
        run: |
          echo "status=success" >> "$GITHUB_OUTPUT"
          echo "Staging deployment verified."

      - name: Rollback on failure
        if: failure()
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_USER: ${{ secrets.STAGING_USER }}
          DEPLOY_DIR: ${{ secrets.STAGING_DEPLOY_DIR }}
        run: |
          echo "WARNING: Deployment failed — initiating rollback..."

          ssh ${STAGING_USER}@${STAGING_HOST} << 'ROLLBACK_SCRIPT'
            set -euo pipefail

            cd ${DEPLOY_DIR:-/opt/noowe}

            if [ -f .rollback-image-tag ]; then
              ROLLBACK_IMAGE=$(cat .rollback-image-tag)
              echo "Rolling back to: ${ROLLBACK_IMAGE}"

              sed -i "s|^BACKEND_IMAGE=.*|BACKEND_IMAGE=${ROLLBACK_IMAGE}|" .env
              docker compose --profile prod up -d --no-deps backend

              echo "Waiting for rollback health check..."
              RETRIES=30
              until docker compose ps backend --format '{{.Health}}' | grep -q "healthy"; do
                RETRIES=$((RETRIES - 1))
                if [ $RETRIES -le 0 ]; then
                  echo "CRITICAL: Rollback also failed health check"
                  exit 1
                fi
                sleep 2
              done

              echo "Rollback completed successfully."
            else
              echo "WARNING: No rollback image tag found. Manual intervention required."
              exit 1
            fi
          ROLLBACK_SCRIPT

      - name: Notify staging deployment result
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          STATUS="${{ job.status }}"
          COLOR="good"
          EMOJI="deployed"

          if [ "$STATUS" != "success" ]; then
            COLOR="danger"
            EMOJI="failed"
          fi

          if [ -n "${SLACK_WEBHOOK:-}" ]; then
            curl -s -X POST "${SLACK_WEBHOOK}" \
              -H 'Content-Type: application/json' \
              -d "{
                \"text\": \"Staging deployment ${EMOJI}\",
                \"attachments\": [{
                  \"color\": \"${COLOR}\",
                  \"fields\": [
                    {\"title\": \"Environment\", \"value\": \"Staging\", \"short\": true},
                    {\"title\": \"Status\", \"value\": \"${STATUS}\", \"short\": true},
                    {\"title\": \"Commit\", \"value\": \"${{ needs.build-and-push.outputs.short_sha }}\", \"short\": true},
                    {\"title\": \"Actor\", \"value\": \"${{ github.actor }}\", \"short\": true}
                  ]
                }]
              }"
          else
            echo "Slack webhook not configured — skipping notification."
          fi

  # =============================================
  # Job 3: Deploy to Production
  # =============================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build-and-push, deploy-staging]

    # Run if staging passed, or on manual dispatch targeting production with skip_staging
    if: >-
      success() ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'production' && inputs.skip_staging == true)

    environment:
      name: production
      url: https://api.noowe.com

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add production host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.PRODUCTION_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Pre-deployment database backup
        env:
          PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
          PRODUCTION_USER: ${{ secrets.PRODUCTION_USER }}
          DEPLOY_DIR: ${{ secrets.PRODUCTION_DEPLOY_DIR }}
        run: |
          echo "Creating pre-deployment database backup..."

          ssh ${PRODUCTION_USER}@${PRODUCTION_HOST} << 'BACKUP_SCRIPT'
            set -euo pipefail

            cd ${DEPLOY_DIR:-/opt/noowe}

            # Trigger a manual backup before deployment
            BACKUP_FILE="pre-deploy-$(date +%Y%m%d-%H%M%S).sql.gz"
            docker compose exec -T postgres pg_dump -U "${DATABASE_USER}" "${DATABASE_NAME}" \
              | gzip > "/opt/noowe/backups/${BACKUP_FILE}"

            echo "Backup created: ${BACKUP_FILE}"
          BACKUP_SCRIPT

      - name: Deploy to production server
        id: deploy
        env:
          PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
          PRODUCTION_USER: ${{ secrets.PRODUCTION_USER }}
          IMAGE_TAG: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          DEPLOY_DIR: ${{ secrets.PRODUCTION_DEPLOY_DIR }}
        run: |
          echo "Deploying to production: ${IMAGE_TAG}"

          ssh ${PRODUCTION_USER}@${PRODUCTION_HOST} << 'DEPLOY_SCRIPT'
            set -euo pipefail

            cd ${DEPLOY_DIR:-/opt/noowe}

            # Save current image tag for rollback
            if docker compose ps backend --format '{{.Image}}' 2>/dev/null; then
              docker compose ps backend --format '{{.Image}}' > .rollback-image-tag
            fi

            # Pull the new image
            echo "Pulling new image..."
            docker pull ${IMAGE_TAG}

            # Update the image tag in the environment
            sed -i "s|^BACKEND_IMAGE=.*|BACKEND_IMAGE=${IMAGE_TAG}|" .env

            # Deploy with zero-downtime
            echo "Starting production deployment..."
            docker compose --profile prod up -d --no-deps backend

            # Wait for container to be healthy (longer timeout for production)
            echo "Waiting for health check..."
            RETRIES=60
            until docker compose ps backend --format '{{.Health}}' | grep -q "healthy"; do
              RETRIES=$((RETRIES - 1))
              if [ $RETRIES -le 0 ]; then
                echo "ERROR: Container failed health check after 120 seconds"
                exit 1
              fi
              sleep 2
            done

            echo "Production deployment completed successfully."
          DEPLOY_SCRIPT

      - name: Run production smoke tests
        id: smoke
        env:
          PRODUCTION_URL: https://api.noowe.com
        run: |
          echo "Running production smoke tests..."

          # Health endpoint
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 15 --retry 3 --retry-delay 5 \
            "${PRODUCTION_URL}/api/v1/health")

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "ERROR: Health check returned HTTP ${HTTP_STATUS}"
            exit 1
          fi
          echo "Health check passed (HTTP ${HTTP_STATUS})."

          # Verify response body
          HEALTH_BODY=$(curl -s --max-time 10 "${PRODUCTION_URL}/api/v1/health")
          echo "Health response: ${HEALTH_BODY}"

          # Verify API responds correctly
          API_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 10 \
            "${PRODUCTION_URL}/api/v1")
          echo "API root status: HTTP ${API_STATUS}"

          echo "All production smoke tests passed."

      - name: Rollback on failure
        if: failure()
        env:
          PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
          PRODUCTION_USER: ${{ secrets.PRODUCTION_USER }}
          DEPLOY_DIR: ${{ secrets.PRODUCTION_DEPLOY_DIR }}
        run: |
          echo "CRITICAL: Production deployment failed — initiating rollback..."

          ssh ${PRODUCTION_USER}@${PRODUCTION_HOST} << 'ROLLBACK_SCRIPT'
            set -euo pipefail

            cd ${DEPLOY_DIR:-/opt/noowe}

            if [ -f .rollback-image-tag ]; then
              ROLLBACK_IMAGE=$(cat .rollback-image-tag)
              echo "Rolling back to: ${ROLLBACK_IMAGE}"

              sed -i "s|^BACKEND_IMAGE=.*|BACKEND_IMAGE=${ROLLBACK_IMAGE}|" .env
              docker compose --profile prod up -d --no-deps backend

              echo "Waiting for rollback health check..."
              RETRIES=60
              until docker compose ps backend --format '{{.Health}}' | grep -q "healthy"; do
                RETRIES=$((RETRIES - 1))
                if [ $RETRIES -le 0 ]; then
                  echo "CRITICAL: Rollback also failed — manual intervention required!"
                  exit 1
                fi
                sleep 2
              done

              echo "Rollback completed successfully."
            else
              echo "CRITICAL: No rollback image tag found. Manual intervention required!"
              exit 1
            fi
          ROLLBACK_SCRIPT

      - name: Notify production deployment result
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          STATUS="${{ job.status }}"
          COLOR="good"
          EMOJI="deployed"
          PRIORITY=""

          if [ "$STATUS" != "success" ]; then
            COLOR="danger"
            EMOJI="FAILED"
            PRIORITY="<!channel> "
          fi

          if [ -n "${SLACK_WEBHOOK:-}" ]; then
            curl -s -X POST "${SLACK_WEBHOOK}" \
              -H 'Content-Type: application/json' \
              -d "{
                \"text\": \"${PRIORITY}Production deployment ${EMOJI}\",
                \"attachments\": [{
                  \"color\": \"${COLOR}\",
                  \"fields\": [
                    {\"title\": \"Environment\", \"value\": \"Production\", \"short\": true},
                    {\"title\": \"Status\", \"value\": \"${STATUS}\", \"short\": true},
                    {\"title\": \"Commit\", \"value\": \"${{ needs.build-and-push.outputs.short_sha }}\", \"short\": true},
                    {\"title\": \"Actor\", \"value\": \"${{ github.actor }}\", \"short\": true},
                    {\"title\": \"Run\", \"value\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\", \"short\": false}
                  ]
                }]
              }"
          else
            echo "Slack webhook not configured — skipping notification."
          fi

      - name: Create deployment record
        if: success()
        run: |
          echo "## Production Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Detail | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Commit** | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Actor** | ${{ github.actor }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Image** | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Environment** | Production |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Timestamp** | $(date -u +'%Y-%m-%d %H:%M:%S UTC') |" >> "$GITHUB_STEP_SUMMARY"
