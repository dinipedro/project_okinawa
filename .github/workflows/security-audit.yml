name: Security Audit

on:
  schedule:
    # Every Monday at 08:00 UTC
    - cron: '0 8 * * 1'
  pull_request:
    branches: [main]

concurrency:
  group: security-audit-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  audit-backend:
    name: Backend Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: ./platform/backend

    outputs:
      audit-result: ${{ steps.audit.outputs.result }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        id: audit
        run: |
          set +e
          AUDIT_OUTPUT=$(npm audit --audit-level=high 2>&1)
          AUDIT_EXIT=$?
          set -e

          echo "exit_code=$AUDIT_EXIT" >> "$GITHUB_OUTPUT"

          # Save full output for the PR comment
          EOF_MARKER=$(dd if=/dev/urandom bs=15 count=1 2>/dev/null | base64)
          echo "result<<$EOF_MARKER" >> "$GITHUB_OUTPUT"
          echo "$AUDIT_OUTPUT" >> "$GITHUB_OUTPUT"
          echo "$EOF_MARKER" >> "$GITHUB_OUTPUT"

          if [ $AUDIT_EXIT -ne 0 ]; then
            echo "::error::Backend npm audit found high severity vulnerabilities"
            exit 1
          else
            echo "Backend audit passed - no high severity vulnerabilities found"
          fi

  audit-mobile:
    name: Mobile Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: ./platform/mobile

    outputs:
      audit-result: ${{ steps.audit.outputs.result }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        id: audit
        run: |
          set +e
          AUDIT_OUTPUT=$(npm audit --audit-level=high 2>&1)
          AUDIT_EXIT=$?
          set -e

          echo "exit_code=$AUDIT_EXIT" >> "$GITHUB_OUTPUT"

          EOF_MARKER=$(dd if=/dev/urandom bs=15 count=1 2>/dev/null | base64)
          echo "result<<$EOF_MARKER" >> "$GITHUB_OUTPUT"
          echo "$AUDIT_OUTPUT" >> "$GITHUB_OUTPUT"
          echo "$EOF_MARKER" >> "$GITHUB_OUTPUT"

          if [ $AUDIT_EXIT -ne 0 ]; then
            echo "::error::Mobile npm audit found high severity vulnerabilities"
            exit 1
          else
            echo "Mobile audit passed - no high severity vulnerabilities found"
          fi

  comment-on-pr:
    name: Report Audit Results on PR
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && always()
    needs: [audit-backend, audit-mobile]
    timeout-minutes: 5

    steps:
      - name: Post audit results as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const backendResult = `${{ needs.audit-backend.outputs.audit-result }}`;
            const mobileResult = `${{ needs.audit-mobile.outputs.audit-result }}`;
            const backendStatus = '${{ needs.audit-backend.result }}';
            const mobileStatus = '${{ needs.audit-mobile.result }}';

            const backendIcon = backendStatus === 'success' ? ':white_check_mark:' : ':x:';
            const mobileIcon = mobileStatus === 'success' ? ':white_check_mark:' : ':x:';

            const body = [
              '## :shield: Security Audit Results',
              '',
              `### ${backendIcon} Backend`,
              '```',
              backendResult.substring(0, 3000) || 'No output captured',
              '```',
              '',
              `### ${mobileIcon} Mobile`,
              '```',
              mobileResult.substring(0, 3000) || 'No output captured',
              '```',
              '',
              `> Audit ran at ${new Date().toISOString()}`,
            ].join('\n');

            // Find existing comment to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(
              (c) => c.user.type === 'Bot' && c.body.includes(':shield: Security Audit Results')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
