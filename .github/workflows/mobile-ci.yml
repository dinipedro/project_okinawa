name: Mobile CI

on:
  push:
    branches: [main]
    paths:
      - 'platform/mobile/**'
      - '.github/workflows/mobile-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'platform/mobile/**'
      - '.github/workflows/mobile-ci.yml'

concurrency:
  group: mobile-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mobile:
    name: Lint, TypeCheck & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: ./platform/mobile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-node-modules
        with:
          path: |
            platform/mobile/node_modules
            platform/mobile/apps/client/node_modules
            platform/mobile/apps/restaurant/node_modules
            platform/mobile/shared/node_modules
          key: mobile-node-modules-${{ runner.os }}-${{ hashFiles('platform/mobile/package-lock.json') }}
          restore-keys: |
            mobile-node-modules-${{ runner.os }}-

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: TypeScript check
        run: npm run typecheck

      - name: Run tests
        run: npm test -- --ci --forceExit --detectOpenHandles
        env:
          CI: true

      - name: Check bundle size (shared)
        run: |
          echo "## Bundle Size Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          SHARED_SIZE=$(du -sh shared/ | cut -f1)
          CLIENT_SIZE=$(du -sh apps/client/src/ | cut -f1)
          RESTAURANT_SIZE=$(du -sh apps/restaurant/src/ | cut -f1)
          echo "| Package | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| Shared | $SHARED_SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "| Client App | $CLIENT_SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "| Restaurant App | $RESTAURANT_SIZE |" >> $GITHUB_STEP_SUMMARY
          # Warn if shared exceeds 2MB source
          SHARED_BYTES=$(du -s shared/ | cut -f1)
          if [ "$SHARED_BYTES" -gt 2048 ]; then
            echo "::warning::Shared package source exceeds 2MB ($SHARED_SIZE)"
          fi

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-coverage
          path: platform/mobile/coverage/
          retention-days: 14
          if-no-files-found: ignore
