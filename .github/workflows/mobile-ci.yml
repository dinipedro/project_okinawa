name: Mobile CI

on:
  push:
    branches: [main]
    paths:
      - 'platform/mobile/**'
      - '.github/workflows/mobile-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'platform/mobile/**'
      - '.github/workflows/mobile-ci.yml'

concurrency:
  group: mobile-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mobile:
    name: Lint, TypeCheck & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: ./platform/mobile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-node-modules
        with:
          path: |
            platform/mobile/node_modules
            platform/mobile/apps/client/node_modules
            platform/mobile/apps/restaurant/node_modules
            platform/mobile/shared/node_modules
          key: mobile-node-modules-${{ runner.os }}-${{ hashFiles('platform/mobile/package-lock.json') }}
          restore-keys: |
            mobile-node-modules-${{ runner.os }}-

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: TypeScript check
        run: npm run typecheck

      - name: Run tests
        run: npm test -- --ci --forceExit --detectOpenHandles
        env:
          CI: true

      - name: Check bundle size
        run: |
          echo "## Bundle Size Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          SHARED_SIZE=$(du -sh shared/ | cut -f1)
          CLIENT_SIZE=$(du -sh apps/client/src/ | cut -f1)
          RESTAURANT_SIZE=$(du -sh apps/restaurant/src/ | cut -f1)
          SHARED_KB=$(du -s shared/ | cut -f1)
          CLIENT_KB=$(du -s apps/client/src/ | cut -f1)
          RESTAURANT_KB=$(du -s apps/restaurant/src/ | cut -f1)
          echo "| Package | Size | Threshold | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|------|-----------|--------|" >> $GITHUB_STEP_SUMMARY

          # Thresholds (in KB): Shared 3MB, Client 5MB, Restaurant 5MB
          SHARED_LIMIT=3072
          CLIENT_LIMIT=5120
          RESTAURANT_LIMIT=5120

          SHARED_STATUS="OK"
          CLIENT_STATUS="OK"
          RESTAURANT_STATUS="OK"

          if [ "$SHARED_KB" -gt "$SHARED_LIMIT" ]; then
            SHARED_STATUS="EXCEEDED"
            echo "::error::Shared package source exceeds ${SHARED_LIMIT}KB threshold ($SHARED_SIZE)"
          fi
          if [ "$CLIENT_KB" -gt "$CLIENT_LIMIT" ]; then
            CLIENT_STATUS="EXCEEDED"
            echo "::error::Client app source exceeds ${CLIENT_LIMIT}KB threshold ($CLIENT_SIZE)"
          fi
          if [ "$RESTAURANT_KB" -gt "$RESTAURANT_LIMIT" ]; then
            RESTAURANT_STATUS="EXCEEDED"
            echo "::error::Restaurant app source exceeds ${RESTAURANT_LIMIT}KB threshold ($RESTAURANT_SIZE)"
          fi

          echo "| Shared | $SHARED_SIZE | ${SHARED_LIMIT}KB | $SHARED_STATUS |" >> $GITHUB_STEP_SUMMARY
          echo "| Client App | $CLIENT_SIZE | ${CLIENT_LIMIT}KB | $CLIENT_STATUS |" >> $GITHUB_STEP_SUMMARY
          echo "| Restaurant App | $RESTAURANT_SIZE | ${RESTAURANT_LIMIT}KB | $RESTAURANT_STATUS |" >> $GITHUB_STEP_SUMMARY

          # Count total .tsx files as complexity metric
          TSX_COUNT=$(find . -name "*.tsx" | wc -l | tr -d ' ')
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Total .tsx files: $TSX_COUNT" >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mobile-coverage
          path: platform/mobile/coverage/
          retention-days: 14
          if-no-files-found: ignore
