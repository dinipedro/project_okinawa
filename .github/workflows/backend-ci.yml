name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'platform/backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'platform/backend/**'
      - '.github/workflows/backend-ci.yml'

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      matrix:
        node-version: [20.x]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: okinawa_test
          POSTGRES_PASSWORD: okinawa_test_pass
          POSTGRES_DB: okinawa_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U okinawa_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: ./platform/backend

    env:
      NODE_ENV: test
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432
      DATABASE_USER: okinawa_test
      DATABASE_PASSWORD: okinawa_test_pass
      DATABASE_NAME: okinawa_test
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      JWT_SECRET: ci-test-secret-key-minimum-32-characters-long
      JWT_REFRESH_SECRET: ci-test-refresh-secret-key-minimum-32-chars

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Cache node_modules
        uses: actions/cache@v5
        id: cache-node-modules
        with:
          path: platform/backend/node_modules
          key: backend-node-modules-${{ runner.os }}-node${{ matrix.node-version }}-${{ hashFiles('platform/backend/package-lock.json') }}
          restore-keys: |
            backend-node-modules-${{ runner.os }}-node${{ matrix.node-version }}-

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Lint
        run: npx eslint . --max-warnings 0

      - name: Run tests with coverage
        run: npx jest --coverage --forceExit --detectOpenHandles --ci

      - name: Check coverage thresholds
        run: |
          node -e "
            const coverage = require('./coverage/coverage-summary.json');
            const total = coverage.total;
            const thresholds = { lines: 80, functions: 75, branches: 60, statements: 80 };
            let failed = false;
            for (const [metric, threshold] of Object.entries(thresholds)) {
              const actual = total[metric].pct;
              if (actual < threshold) {
                console.error('FAIL: ' + metric + ' coverage ' + actual + '% is below threshold ' + threshold + '%');
                failed = true;
              } else {
                console.log('PASS: ' + metric + ' coverage: ' + actual + '% (threshold: ' + threshold + '%)');
              }
            }
            if (failed) process.exit(1);
          "

      - name: Build
        run: npm run build

      - name: Verify compiled output
        run: |
          node -e "
            const path = require('path');
            const fs = require('fs');
            const distDir = path.join(process.cwd(), 'dist');
            if (!fs.existsSync(distDir)) {
              console.error('ERROR: dist/ directory not found after build');
              process.exit(1);
            }
            const { execSync } = require('child_process');
            const entities = execSync('find dist -name \"*.entity.js\" | head -20', { encoding: 'utf8' });
            const count = entities.trim().split('\n').filter(Boolean).length;
            console.log('Entity files found in dist:', count);
            if (count === 0) {
              console.error('ERROR: No entity files found in dist/');
              process.exit(1);
            }
            console.log('Build verification passed');
          "

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-node${{ matrix.node-version }}
          path: platform/backend/coverage/
          retention-days: 14
