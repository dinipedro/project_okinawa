name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # =============================================
  # Frontend (React/Vite)
  # =============================================
  frontend:
    name: Frontend — Lint, TypeCheck, Test, Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ./site

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint . --max-warnings 0

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run tests
        run: npx vitest run --coverage --reporter=verbose
        env:
          CI: true

      - name: Build
        run: npm run build

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: site/coverage/
          retention-days: 7

  # =============================================
  # Backend (NestJS)
  # =============================================
  backend:
    name: Backend — Lint, TypeCheck, Test, Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ./platform/backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: platform/backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint . --max-warnings 0

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npx jest --coverage --forceExit --detectOpenHandles
        env:
          NODE_ENV: test
          DATABASE_HOST: localhost
          DATABASE_USER: test
          DATABASE_PASSWORD: test
          DATABASE_NAME: test
          JWT_SECRET: test-secret-key-minimum-32-characters-long
          JWT_REFRESH_SECRET: test-refresh-secret-key-minimum-32-chars

      - name: Build
        run: npm run build

      - name: Verify migrations resolve in dist
        run: |
          echo "Checking entity and migration glob patterns resolve correctly..."
          node -e "
            const path = require('path');
            const fs = require('fs');

            // Verify dist directory exists after build
            const distDir = path.join(process.cwd(), 'dist');
            if (!fs.existsSync(distDir)) {
              console.error('ERROR: dist/ directory not found after build');
              process.exit(1);
            }

            // Check migrations directory
            const migrationsDir = path.join(distDir, 'database', 'migrations');
            console.log('Migrations dir:', migrationsDir);
            console.log('Migrations dir exists:', fs.existsSync(migrationsDir));

            // Check compiled config resolves globs correctly
            const configPath = path.join(distDir, 'config', 'typeorm.config.js');
            if (fs.existsSync(configPath)) {
              console.log('✅ typeorm.config.js found in dist/');
            } else {
              console.error('ERROR: typeorm.config.js not found in dist/');
              process.exit(1);
            }

            // Verify entity files exist in dist
            const { execSync } = require('child_process');
            const entities = execSync('find dist -name \"*.entity.js\" | head -20', { encoding: 'utf8' });
            const count = entities.trim().split('\\n').filter(Boolean).length;
            console.log('Entity files found in dist:', count);
            if (count === 0) {
              console.error('ERROR: No entity files found in dist/');
              process.exit(1);
            }
            console.log('✅ Migration path verification passed');
          "

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: platform/backend/coverage/
          retention-days: 7

  # =============================================
  # Docker Build Validation
  # =============================================
  docker:
    name: Docker — Build Validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [backend]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend Docker image
        run: |
          docker build \
            --target production \
            --tag okinawa-backend:ci-${{ github.sha }} \
            ./platform/backend

  # =============================================
  # Security Scan
  # =============================================
  security:
    name: Security — Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Audit frontend dependencies
        run: cd site && npm audit --audit-level=critical
        continue-on-error: false

      - name: Audit backend dependencies
        run: cd platform/backend && npm audit --audit-level=critical
        continue-on-error: false

      - name: Check for hardcoded secrets
        run: |
          echo "Scanning for potential hardcoded secrets..."
          # Check for common secret patterns (excluding test files and .env.example)
          FOUND=$(grep -rn \
            --include="*.ts" --include="*.js" --include="*.yml" --include="*.yaml" \
            --exclude-dir=node_modules --exclude-dir=dist --exclude-dir=.git \
            -E "(password|secret|api.?key)\s*[:=]\s*['\"][^'\"$\{]" . \
            | grep -v ".env.example" \
            | grep -v ".spec.ts" \
            | grep -v ".test.ts" \
            | grep -v "CHANGE_ME" \
            | grep -v "your-" \
            || true)
          if [ -n "$FOUND" ]; then
            echo "⚠️ Potential hardcoded secrets found:"
            echo "$FOUND"
            echo "::warning::Potential hardcoded secrets detected. Review the findings above."
          else
            echo "✅ No hardcoded secrets detected."
          fi
