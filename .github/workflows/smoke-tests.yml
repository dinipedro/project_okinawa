# ===========================================
# Project Okinawa — Post-Deployment Smoke Tests
# Reusable workflow for validating deployments
# ===========================================

name: Smoke Tests

on:
  # Reusable workflow — called by deploy.yml or other workflows
  workflow_call:
    inputs:
      target_url:
        description: 'Base URL to test against (e.g., https://staging-api.noowe.com)'
        required: true
        type: string
      environment:
        description: 'Target environment (staging or production)'
        required: true
        type: string

  # Manual trigger for on-demand smoke testing
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Base URL to test against (e.g., https://staging-api.noowe.com)'
        required: true
        type: string
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  # =============================================
  # Smoke Test Suite
  # =============================================
  smoke-tests:
    name: Smoke Tests (${{ inputs.environment }})
    runs-on: ubuntu-latest
    timeout-minutes: 10

    environment:
      name: ${{ inputs.environment }}

    steps:
      - name: Validate inputs
        run: |
          if [ -z "${{ inputs.target_url }}" ]; then
            echo "ERROR: target_url is required"
            exit 1
          fi

          if [ -z "${{ inputs.environment }}" ]; then
            echo "ERROR: environment is required"
            exit 1
          fi

          echo "## Smoke Test Configuration" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Setting | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Target URL** | \`${{ inputs.target_url }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Environment** | ${{ inputs.environment }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Triggered by** | ${{ github.actor }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Timestamp** | $(date -u +'%Y-%m-%d %H:%M:%S UTC') |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

      # -------------------------------------------
      # Test 1: Health Check
      # -------------------------------------------
      - name: "Test 1: Health Check (GET /api/v1/health)"
        id: health_check
        run: |
          TARGET_URL="${{ inputs.target_url }}"
          ENDPOINT="${TARGET_URL}/api/v1/health"
          echo "Testing: ${ENDPOINT}"

          MAX_RETRIES=3
          RETRY_DELAY=5
          ATTEMPT=0
          SUCCESS=false

          while [ $ATTEMPT -lt $MAX_RETRIES ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "Attempt ${ATTEMPT}/${MAX_RETRIES}..."

            HTTP_STATUS=$(curl -s -o /tmp/health_response.json -w "%{http_code}" \
              --max-time 15 "${ENDPOINT}" 2>/dev/null || echo "000")

            if [ "$HTTP_STATUS" = "200" ]; then
              echo "PASS: Health check returned HTTP ${HTTP_STATUS}"
              echo "Response body:"
              cat /tmp/health_response.json | jq . 2>/dev/null || cat /tmp/health_response.json
              SUCCESS=true
              break
            fi

            echo "Attempt ${ATTEMPT} failed with HTTP ${HTTP_STATUS}"
            if [ $ATTEMPT -lt $MAX_RETRIES ]; then
              echo "Retrying in ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
            fi
          done

          if [ "$SUCCESS" != "true" ]; then
            echo "FAIL: Health check failed after ${MAX_RETRIES} attempts (last status: ${HTTP_STATUS})"
            echo "health_check=fail" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "health_check=pass" >> "$GITHUB_OUTPUT"

      # -------------------------------------------
      # Test 2: Health Readiness
      # -------------------------------------------
      - name: "Test 2: Health Readiness (GET /api/v1/health/ready)"
        id: health_ready
        run: |
          TARGET_URL="${{ inputs.target_url }}"
          ENDPOINT="${TARGET_URL}/api/v1/health/ready"
          echo "Testing: ${ENDPOINT}"

          MAX_RETRIES=3
          RETRY_DELAY=5
          ATTEMPT=0
          SUCCESS=false

          while [ $ATTEMPT -lt $MAX_RETRIES ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "Attempt ${ATTEMPT}/${MAX_RETRIES}..."

            HTTP_STATUS=$(curl -s -o /tmp/health_ready_response.json -w "%{http_code}" \
              --max-time 15 "${ENDPOINT}" 2>/dev/null || echo "000")

            if [ "$HTTP_STATUS" = "200" ]; then
              echo "PASS: Health readiness returned HTTP ${HTTP_STATUS}"
              echo "Response body:"
              cat /tmp/health_ready_response.json | jq . 2>/dev/null || cat /tmp/health_ready_response.json
              SUCCESS=true
              break
            fi

            echo "Attempt ${ATTEMPT} failed with HTTP ${HTTP_STATUS}"
            if [ $ATTEMPT -lt $MAX_RETRIES ]; then
              echo "Retrying in ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
            fi
          done

          if [ "$SUCCESS" != "true" ]; then
            echo "FAIL: Health readiness failed after ${MAX_RETRIES} attempts (last status: ${HTTP_STATUS})"
            echo "health_ready=fail" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "health_ready=pass" >> "$GITHUB_OUTPUT"

      # -------------------------------------------
      # Test 3: Legal Versions
      # -------------------------------------------
      - name: "Test 3: Legal Versions (GET /api/v1/legal/versions)"
        id: legal_versions
        run: |
          TARGET_URL="${{ inputs.target_url }}"
          ENDPOINT="${TARGET_URL}/api/v1/legal/versions"
          echo "Testing: ${ENDPOINT}"

          MAX_RETRIES=3
          RETRY_DELAY=5
          ATTEMPT=0
          SUCCESS=false

          while [ $ATTEMPT -lt $MAX_RETRIES ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "Attempt ${ATTEMPT}/${MAX_RETRIES}..."

            HTTP_STATUS=$(curl -s -o /tmp/legal_versions_response.json -w "%{http_code}" \
              --max-time 15 "${ENDPOINT}" 2>/dev/null || echo "000")

            if [ "$HTTP_STATUS" = "200" ]; then
              BODY=$(cat /tmp/legal_versions_response.json)
              echo "Response body:"
              echo "$BODY" | jq . 2>/dev/null || echo "$BODY"

              # Validate response contains expected fields
              HAS_TERMS=$(echo "$BODY" | jq -r 'has("termsVersion")' 2>/dev/null || echo "false")
              HAS_PRIVACY=$(echo "$BODY" | jq -r 'has("privacyVersion")' 2>/dev/null || echo "false")

              if [ "$HAS_TERMS" = "true" ] && [ "$HAS_PRIVACY" = "true" ]; then
                echo "PASS: Legal versions returned HTTP ${HTTP_STATUS} with termsVersion and privacyVersion"
                SUCCESS=true
                break
              else
                echo "WARN: HTTP 200 but missing expected fields (termsVersion: ${HAS_TERMS}, privacyVersion: ${HAS_PRIVACY})"
              fi
            fi

            echo "Attempt ${ATTEMPT} failed with HTTP ${HTTP_STATUS}"
            if [ $ATTEMPT -lt $MAX_RETRIES ]; then
              echo "Retrying in ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
            fi
          done

          if [ "$SUCCESS" != "true" ]; then
            echo "FAIL: Legal versions check failed after ${MAX_RETRIES} attempts"
            echo "legal_versions=fail" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "legal_versions=pass" >> "$GITHUB_OUTPUT"

      # -------------------------------------------
      # Test 4: Legal Contacts
      # -------------------------------------------
      - name: "Test 4: Legal Contacts (GET /api/v1/legal/contacts)"
        id: legal_contacts
        run: |
          TARGET_URL="${{ inputs.target_url }}"
          ENDPOINT="${TARGET_URL}/api/v1/legal/contacts"
          echo "Testing: ${ENDPOINT}"

          MAX_RETRIES=3
          RETRY_DELAY=5
          ATTEMPT=0
          SUCCESS=false

          while [ $ATTEMPT -lt $MAX_RETRIES ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "Attempt ${ATTEMPT}/${MAX_RETRIES}..."

            HTTP_STATUS=$(curl -s -o /tmp/legal_contacts_response.json -w "%{http_code}" \
              --max-time 15 "${ENDPOINT}" 2>/dev/null || echo "000")

            if [ "$HTTP_STATUS" = "200" ]; then
              BODY=$(cat /tmp/legal_contacts_response.json)
              echo "Response body:"
              echo "$BODY" | jq . 2>/dev/null || echo "$BODY"

              # Validate response contains expected fields
              HAS_PRIVACY=$(echo "$BODY" | jq -r 'has("privacy")' 2>/dev/null || echo "false")
              HAS_SUPPORT=$(echo "$BODY" | jq -r 'has("support")' 2>/dev/null || echo "false")

              if [ "$HAS_PRIVACY" = "true" ] && [ "$HAS_SUPPORT" = "true" ]; then
                echo "PASS: Legal contacts returned HTTP ${HTTP_STATUS} with privacy and support fields"
                SUCCESS=true
                break
              else
                echo "WARN: HTTP 200 but missing expected fields (privacy: ${HAS_PRIVACY}, support: ${HAS_SUPPORT})"
              fi
            fi

            echo "Attempt ${ATTEMPT} failed with HTTP ${HTTP_STATUS}"
            if [ $ATTEMPT -lt $MAX_RETRIES ]; then
              echo "Retrying in ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
            fi
          done

          if [ "$SUCCESS" != "true" ]; then
            echo "FAIL: Legal contacts check failed after ${MAX_RETRIES} attempts"
            echo "legal_contacts=fail" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "legal_contacts=pass" >> "$GITHUB_OUTPUT"

      # -------------------------------------------
      # Test 5: Privacy Policy
      # -------------------------------------------
      - name: "Test 5: Privacy Policy (GET /api/v1/legal/privacy-policy)"
        id: privacy_policy
        run: |
          TARGET_URL="${{ inputs.target_url }}"
          ENDPOINT="${TARGET_URL}/api/v1/legal/privacy-policy"
          echo "Testing: ${ENDPOINT}"

          MAX_RETRIES=3
          RETRY_DELAY=5
          ATTEMPT=0
          SUCCESS=false

          while [ $ATTEMPT -lt $MAX_RETRIES ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "Attempt ${ATTEMPT}/${MAX_RETRIES}..."

            HTTP_STATUS=$(curl -s -o /tmp/privacy_policy_response.json -w "%{http_code}" \
              --max-time 15 "${ENDPOINT}" 2>/dev/null || echo "000")

            if [ "$HTTP_STATUS" = "200" ]; then
              echo "PASS: Privacy policy returned HTTP ${HTTP_STATUS}"
              echo "Response size: $(wc -c < /tmp/privacy_policy_response.json) bytes"
              SUCCESS=true
              break
            fi

            echo "Attempt ${ATTEMPT} failed with HTTP ${HTTP_STATUS}"
            if [ $ATTEMPT -lt $MAX_RETRIES ]; then
              echo "Retrying in ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
            fi
          done

          if [ "$SUCCESS" != "true" ]; then
            echo "FAIL: Privacy policy check failed after ${MAX_RETRIES} attempts (last status: ${HTTP_STATUS})"
            echo "privacy_policy=fail" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "privacy_policy=pass" >> "$GITHUB_OUTPUT"

      # -------------------------------------------
      # Test 6: Metrics Endpoint (non-critical)
      # -------------------------------------------
      - name: "Test 6: Metrics (GET /metrics)"
        id: metrics
        continue-on-error: true
        run: |
          TARGET_URL="${{ inputs.target_url }}"
          ENDPOINT="${TARGET_URL}/metrics"
          echo "Testing: ${ENDPOINT}"
          echo "Note: This test is non-critical — metrics may be disabled."

          MAX_RETRIES=3
          RETRY_DELAY=5
          ATTEMPT=0
          SUCCESS=false

          while [ $ATTEMPT -lt $MAX_RETRIES ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "Attempt ${ATTEMPT}/${MAX_RETRIES}..."

            HTTP_STATUS=$(curl -s -o /tmp/metrics_response.txt -w "%{http_code}" \
              --max-time 15 "${ENDPOINT}" 2>/dev/null || echo "000")

            if [ "$HTTP_STATUS" = "200" ]; then
              echo "PASS: Metrics endpoint returned HTTP ${HTTP_STATUS}"
              echo "Response preview (first 10 lines):"
              head -10 /tmp/metrics_response.txt
              SUCCESS=true
              break
            elif [ "$HTTP_STATUS" = "404" ]; then
              echo "SKIP: Metrics endpoint not found (METRICS_ENABLED may be false)"
              echo "metrics=skip" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "Attempt ${ATTEMPT} failed with HTTP ${HTTP_STATUS}"
            if [ $ATTEMPT -lt $MAX_RETRIES ]; then
              echo "Retrying in ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
            fi
          done

          if [ "$SUCCESS" = "true" ]; then
            echo "metrics=pass" >> "$GITHUB_OUTPUT"
          else
            echo "WARN: Metrics endpoint returned HTTP ${HTTP_STATUS} — this is non-critical"
            echo "metrics=fail" >> "$GITHUB_OUTPUT"
          fi

      # -------------------------------------------
      # Test 7: Auth Register Validation
      # -------------------------------------------
      - name: "Test 7: Auth Register Validation (POST /api/v1/auth/register)"
        id: auth_validation
        run: |
          TARGET_URL="${{ inputs.target_url }}"
          ENDPOINT="${TARGET_URL}/api/v1/auth/register"
          echo "Testing: ${ENDPOINT}"
          echo "Sending empty body to verify ValidationPipe returns 400..."

          MAX_RETRIES=3
          RETRY_DELAY=5
          ATTEMPT=0
          SUCCESS=false

          while [ $ATTEMPT -lt $MAX_RETRIES ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "Attempt ${ATTEMPT}/${MAX_RETRIES}..."

            HTTP_STATUS=$(curl -s -o /tmp/auth_register_response.json -w "%{http_code}" \
              --max-time 15 \
              -X POST \
              -H "Content-Type: application/json" \
              -d '{}' \
              "${ENDPOINT}" 2>/dev/null || echo "000")

            if [ "$HTTP_STATUS" = "400" ]; then
              echo "PASS: Auth register validation returned HTTP ${HTTP_STATUS} (ValidationPipe is active)"
              echo "Response body:"
              cat /tmp/auth_register_response.json | jq . 2>/dev/null || cat /tmp/auth_register_response.json
              SUCCESS=true
              break
            fi

            echo "Attempt ${ATTEMPT} failed with HTTP ${HTTP_STATUS}"
            if [ $ATTEMPT -lt $MAX_RETRIES ]; then
              echo "Retrying in ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
            fi
          done

          if [ "$SUCCESS" != "true" ]; then
            echo "FAIL: Auth register validation failed after ${MAX_RETRIES} attempts (expected 400, got ${HTTP_STATUS})"
            echo "auth_validation=fail" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "auth_validation=pass" >> "$GITHUB_OUTPUT"

      # -------------------------------------------
      # Test 8: CORS Headers
      # -------------------------------------------
      - name: "Test 8: CORS Headers (OPTIONS /api/v1/health)"
        id: cors_headers
        run: |
          TARGET_URL="${{ inputs.target_url }}"
          ENDPOINT="${TARGET_URL}/api/v1/health"
          echo "Testing CORS preflight: ${ENDPOINT}"

          MAX_RETRIES=3
          RETRY_DELAY=5
          ATTEMPT=0
          SUCCESS=false

          while [ $ATTEMPT -lt $MAX_RETRIES ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "Attempt ${ATTEMPT}/${MAX_RETRIES}..."

            RESPONSE_HEADERS=$(curl -s -D - -o /dev/null \
              --max-time 15 \
              -X OPTIONS \
              -H "Origin: https://noowe.com" \
              -H "Access-Control-Request-Method: GET" \
              -H "Access-Control-Request-Headers: Content-Type" \
              "${ENDPOINT}" 2>/dev/null || echo "")

            echo "Response headers:"
            echo "$RESPONSE_HEADERS"

            # Check for Access-Control headers (case-insensitive)
            HAS_ALLOW_ORIGIN=$(echo "$RESPONSE_HEADERS" | grep -i "access-control-allow-origin" || true)
            HAS_ALLOW_METHODS=$(echo "$RESPONSE_HEADERS" | grep -i "access-control-allow-methods" || true)

            if [ -n "$HAS_ALLOW_ORIGIN" ]; then
              echo ""
              echo "PASS: CORS headers present"
              echo "  Allow-Origin: ${HAS_ALLOW_ORIGIN}"
              if [ -n "$HAS_ALLOW_METHODS" ]; then
                echo "  Allow-Methods: ${HAS_ALLOW_METHODS}"
              fi
              SUCCESS=true
              break
            fi

            echo "Attempt ${ATTEMPT}: No Access-Control-Allow-Origin header found"
            if [ $ATTEMPT -lt $MAX_RETRIES ]; then
              echo "Retrying in ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
            fi
          done

          if [ "$SUCCESS" != "true" ]; then
            echo "FAIL: CORS headers not found after ${MAX_RETRIES} attempts"
            echo "cors_headers=fail" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "cors_headers=pass" >> "$GITHUB_OUTPUT"

      # -------------------------------------------
      # Summary
      # -------------------------------------------
      - name: Generate test summary
        if: always()
        run: |
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Smoke Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| # | Test | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|------|--------|" >> "$GITHUB_STEP_SUMMARY"

          # Map step outcomes to status indicators
          format_status() {
            case "$1" in
              success) echo "PASS" ;;
              failure) echo "FAIL" ;;
              skipped) echo "SKIP" ;;
              *) echo "UNKNOWN" ;;
            esac
          }

          echo "| 1 | Health Check (\`GET /api/v1/health\`) | $(format_status '${{ steps.health_check.outcome }}') |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 2 | Health Readiness (\`GET /api/v1/health/ready\`) | $(format_status '${{ steps.health_ready.outcome }}') |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 3 | Legal Versions (\`GET /api/v1/legal/versions\`) | $(format_status '${{ steps.legal_versions.outcome }}') |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 4 | Legal Contacts (\`GET /api/v1/legal/contacts\`) | $(format_status '${{ steps.legal_contacts.outcome }}') |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 5 | Privacy Policy (\`GET /api/v1/legal/privacy-policy\`) | $(format_status '${{ steps.privacy_policy.outcome }}') |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 6 | Metrics (\`GET /metrics\`) | $(format_status '${{ steps.metrics.outcome }}') |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 7 | Auth Register Validation (\`POST /api/v1/auth/register\`) | $(format_status '${{ steps.auth_validation.outcome }}') |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 8 | CORS Headers (\`OPTIONS /api/v1/health\`) | $(format_status '${{ steps.cors_headers.outcome }}') |" >> "$GITHUB_STEP_SUMMARY"

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "---" >> "$GITHUB_STEP_SUMMARY"
          echo "*Smoke tests ran against \`${{ inputs.target_url }}\` (${{ inputs.environment }})*" >> "$GITHUB_STEP_SUMMARY"

      - name: Final status check
        if: always()
        run: |
          CRITICAL_TESTS=(
            "${{ steps.health_check.outcome }}"
            "${{ steps.health_ready.outcome }}"
            "${{ steps.legal_versions.outcome }}"
            "${{ steps.legal_contacts.outcome }}"
            "${{ steps.privacy_policy.outcome }}"
            "${{ steps.auth_validation.outcome }}"
            "${{ steps.cors_headers.outcome }}"
          )

          FAILED=0
          PASSED=0

          for status in "${CRITICAL_TESTS[@]}"; do
            if [ "$status" = "failure" ]; then
              FAILED=$((FAILED + 1))
            elif [ "$status" = "success" ]; then
              PASSED=$((PASSED + 1))
            fi
          done

          TOTAL=${#CRITICAL_TESTS[@]}
          echo ""
          echo "============================================="
          echo "  SMOKE TEST RESULTS: ${PASSED}/${TOTAL} passed"
          echo "============================================="
          echo ""

          if [ $FAILED -gt 0 ]; then
            echo "RESULT: ${FAILED} critical test(s) failed."
            echo "Environment: ${{ inputs.environment }}"
            echo "Target: ${{ inputs.target_url }}"
            exit 1
          fi

          echo "RESULT: All critical smoke tests passed."
          echo "Environment: ${{ inputs.environment }}"
          echo "Target: ${{ inputs.target_url }}"
